<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Damas da Copa do Mundo 2026</title>
    <style>
        /* Reset para Mobile e Performance */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
        }

        /* BANNER TOPO FIXO (320x50) */
        .ad-top {
            width: 100%;
            height: 50px;
            background-color: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid #1e293b;
        }

        /* ÁREA PRINCIPAL */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            overflow-y: auto;
        }

        /* TELA DE SELEÇÃO DE TIMES */
        #setup-screen {
            width: 100%;
            max-width: 400px;
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin: auto;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #38bdf8;
        }

        .select-box {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 5px;
            color: #94a3b8;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            color: white;
            border: 1px solid #3b82f6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        /* PAINEL DE STATUS DO JOGO */
        #game-screen {
            display: none;
            width: 100%;
            max-width: 400px;
            flex-direction: column;
            align-items: center;
            margin: auto;
        }

        .status-panel {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        /* TABULEIRO DE DAMAS */
        .checkerboard {
            width: 100%;
            aspect-ratio: 1 / 1;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            border: 4px solid #1e293b;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        .square {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .light-square { background-color: #e2e8f0; }
        .dark-square { background-color: #334155; }
        .selected-square { background-color: #0ea5e9 !important; }
        .highlight-move { background-color: #22c55e !important; cursor: pointer; }

        /* PEÇAS DO JOGO */
        .piece {
            width: 82%;
            height: 82%;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.6), 0 3px 5px rgba(0,0,0,0.5);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }

        .piece.player-piece { border: 3px solid #f43f5e; }
        .piece.cpu-piece { border: 3px solid #fbbf24; }

        /* Indicador de Dama (King) */
        .piece.king::after {
            content: "👑";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            text-shadow: 0 1px 2px black;
        }

        /* BOTOES DE AÇÃO */
        .btn-action {
            width: 100%;
            padding: 14px;
            background-color: #38bdf8;
            border: none;
            color: #0f172a;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.3);
            margin-top: 10px;
        }

        /* BANNER RODAPÉ FIXO (320x50) */
        .ad-bottom {
            width: 100%;
            height: 50px;
            background-color: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-top: 1px solid #1e293b;
        }
    </style>
</head>
<body>

    <div class="ad-top">
        <script>
            atOptions = {
                'key' : 'f95477b41aad412b789767be6416723b',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script src="https://www.highperformanceformat.com/f95477b41aad412b789767be6416723b/invoke.js"></script>
    </div>

    <main>
        <div id="setup-screen">
            <h2>Damas da Copa do Mundo 2026</h2>
            <div class="select-box">
                <label for="player-select">Escolha Seu País:</label>
                <select id="player-select"></select>
            </div>
            <div class="select-box">
                <label for="cpu-select">Escolha o Adversário (IA):</label>
                <select id="cpu-select"></select>
            </div>
            <button class="btn-action" id="btn-start">Iniciar Confronto</button>
        </div>

        <div id="game-screen">
            <div class="status-panel">
                <div id="turn-display">Seu Turno</div>
                <div>Placar: <span id="score-display" style="color:#38bdf8">12 x 12</span></div>
            </div>

            <div class="checkerboard" id="board"></div>

            <button class="btn-action" id="btn-reset" style="background-color: #475569; color: white;">Voltar ao Menu</button>
        </div>
    </main>

    <div class="ad-bottom">
        <script>
            atOptions = {
                'key' : 'f95477b41aad412b789767be6416723b',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script src="https://www.highperformanceformat.com/f95477b41aad412b789767be6416723b/invoke.js"></script>
    </div>

    <script>
        const countriesData = [
            { name: "Estados Unidos", code: "us" }, { name: "México", code: "mx" }, { name: "Canadá", code: "ca" },
            { name: "Argentina", code: "ar" }, { name: "Brasil", code: "br" }, { name: "França", code: "fr" },
            { name: "Inglaterra", code: "gb" }, { name: "Espanha", code: "es" }, { name: "Alemanha", code: "de" },
            { name: "Itália", code: "it" }, { name: "Portugal", code: "pt" }, { name: "Holanda", code: "nl" },
            { name: "Bélgica", code: "be" }, { name: "Uruguai", code: "uy" }, { name: "Colômbia", code: "co" },
            { name: "Marrocos", code: "ma" }, { name: "Croácia", code: "hr" }, { name: "Japão", code: "jp" },
            { name: "Coreia do Sul", code: "kr" }, { name: "Austrália", code: "au" }, { name: "Irã", code: "ir" },
            { name: "Senegal", code: "sn" }, { name: "Tunísia", code: "tn" }, { name: "Argélia", code: "dz" },
            { name: "Egito", code: "eg" }, { name: "Nigéria", code: "ng" }, { name: "Camarões", code: "cm" },
            { name: "Costa do Marfim", code: "ci" }, { name: "Equador", code: "ec" }, { name: "Peru", code: "pe" },
            { name: "Chile", code: "cl" }, { name: "Paraguai", code: "py" }, { name: "Venezuela", code: "ve" },
            { name: "Panamá", code: "pa" }, { name: "Costa Rica", code: "cr" }, { name: "Jamaica", code: "jm" },
            { name: "Honduras", code: "hn" }, { name: "Arábia Saudita", code: "sa" }, { name: "Catar", code: "qa" },
            { name: "Emirados Árabes", code: "ae" }, { name: "Iraque", code: "iq" }, { name: "Uzbequistão", code: "uz" },
            { name: "Nova Zelândia", code: "nz" }, { name: "Suíça", code: "ch" }, { name: "Dinamarca", code: "dk" },
            { name: "Sérvia", code: "rs" }, { name: "Polônia", code: "pl" }, { name: "Ucrânia", code: "ua" }
        ];

        // Definições lógicas: 0 = vazio, 1 = Jogador, 2 = CPU, 3 = Dama Jogador, 4 = Dama CPU
        let boardState = [];
        let playerFlag = "";
        let cpuFlag = "";
        let selectedPiece = null;
        let validMoves = [];
        let playerTurn = true;
        let pCount = 12, cpuCount = 12;

        const setupScreen = document.getElementById('setup-screen');
        const gameScreen = document.getElementById('game-screen');
        const boardElement = document.getElementById('board');
        const playerSelect = document.getElementById('player-select');
        const cpuSelect = document.getElementById('cpu-select');
        const turnDisplay = document.getElementById('turn-display');
        const scoreDisplay = document.getElementById('score-display');

        // Preenche seletores na inicialização
        function populateSelects() {
            countriesData.forEach((c, idx) => {
                let opt1 = new Option(c.name, c.code);
                let opt2 = new Option(c.name, c.code);
                if(idx === 4) opt1.selected = true; // Brasil padrão jogador
                if(idx === 5) opt2.selected = true; // França padrão CPU
                playerSelect.add(opt1);
                cpuSelect.add(opt2);
            });
        }

        // Configuração inicial da matriz de estado do tabuleiro (8x8)
        function setupBoardState() {
            boardState = Array(8).fill(null).map(() => Array(8).fill(0));
            // Peças da CPU (Linhas superiores de 0 a 2)
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 8; c++) {
                    if ((r + c) % 2 === 1) boardState[r][c] = 2;
                }
            }
            // Peças do Jogador (Linhas inferiores de 5 a 7)
            for (let r = 5; r < 7; r++) {
                for (let c = 0; c < 8; c++) {
                    if ((r + c) % 2 === 1) boardState[r][c] = 1;
                }
            }
            pCount = 12; cpuCount = 12;
            playerTurn = true;
        }

        function drawBoard() {
            boardElement.innerHTML = '';
            scoreDisplay.innerText = `${pCount} x ${cpuCount}`;
            turnDisplay.innerText = playerTurn ? "Seu Turno" : "Turno do Adversário";

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    square.classList.add('square');
                    square.classList.add((r + c) % 2 === 1 ? 'dark-square' : 'light-square');
                    square.dataset.row = r;
                    square.dataset.col = c;

                    let type = boardState[r][c];
                    if (type > 0) {
                        const piece = document.createElement('div');
                        piece.classList.add('piece');
                        if (type === 1 || type === 3) {
                            piece.classList.add('player-piece');
                            piece.style.backgroundImage = `url('https://flagcdn.com/w80/${playerFlag}.png')`;
                            if(playerTurn) piece.addEventListener('click', (e) => { e.stopPropagation(); selectPiece(r, c); });
                        } else {
                            piece.classList.add('cpu-piece');
                            piece.style.backgroundImage = `url('https://flagcdn.com/w80/${cpuFlag}.png')`;
                        }
                        if (type === 3 || type === 4) piece.classList.add('king');
                        square.appendChild(piece);
                    }

                    // Destaca seleção atual e movimentos possíveis
                    if (selectedPiece && selectedPiece.row === r && selectedPiece.col === c) {
                        square.classList.add('selected-square');
                    }
                    
                    let isMove = validMoves.find(m => m.toR === r && m.toC === c);
                    if (isMove) {
                        square.classList.add('highlight-move');
                        square.addEventListener('click', () => executeMove(isMove));
                    }

                    boardElement.appendChild(square);
                }
            }
        }

        function selectPiece(r, c) {
            if (!playerTurn) return;
            selectedPiece = { row: r, col: c };
            validMoves = getMovesForPiece(r, c);
            drawBoard();
        }

        function getMovesForPiece(r, c) {
            let moves = [];
            let type = boardState[r][c];
            if (type === 0) return moves;

            // Direções de movimento simples: Jogador sobe (-1), CPU desce (+1), Damas usam ambas
            let rowDirs = [];
            if (type === 1) rowDirs = [-1];
            if (type === 2) rowDirs = [1];
            if (type === 3 || type === 4) rowDirs = [-1, 1];

            let colDirs = [-1, 1];

            // Varre direções em busca de movimentos simples ou capturas
            rowDirs.forEach(dr => {
                colDirs.forEach(dc => {
                    let nextR = r + dr;
                    let nextC = c + dc;
                    if (nextR >= 0 && nextR < 8 && nextC >= 0 && nextC < 8) {
                        if (boardState[nextR][nextC] === 0) {
                            moves.push({ fromR: r, fromC: c, toR: nextR, toC: nextC, capture: null });
                        } else {
                            // Verifica possibilidade de pulo/captura
                            let isEnemy = (type === 1 || type === 3) ? [2,4] : [1,3];
                            if (isEnemy.includes(boardState[nextR][nextC])) {
                                let jumpR = nextR + dr;
                                let jumpC = nextC + dc;
                                if (jumpR >= 0 && jumpR < 8 && jumpC >= 0 && jumpC < 8 && boardState[jumpR][jumpC] === 0) {
                                    moves.push({ fromR: r, fromC: c, toR: jumpR, toC: jumpC, capture: { r: nextR, c: nextC } });
                                }
                            }
                        }
                    }
                });
            });

            // Prioriza capturas obrigatórias se existirem
            let captures = moves.filter(m => m.capture !== null);
            return captures.length > 0 ? captures : moves;
        }

        function executeMove(move) {
            let type = boardState[move.fromR][move.fromC];
            
            // Promoção para Dama
            if (type === 1 && move.toR === 0) type = 3;
            if (type === 2 && move.toR === 7) type = 4;

            boardState[move.toR][move.toC] = type;
            boardState[move.fromR][move.fromC] = 0;

            if (move.capture) {
                let capType = boardState[move.capture.r][move.capture.c];
                if (capType === 1 || type === 3) pCount--; else cpuCount--;
                boardState[move.capture.r][move.capture.c] = 0;
            }

            selectedPiece = null;
            validMoves = [];
            
            if (checkGameOver()) return;

            playerTurn = !playerTurn;
            drawBoard();

            if (!playerTurn) {
                setTimeout(cpuPlay, 800);
            }
        }

        function cpuPlay() {
            let allMoves = [];
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (boardState[r][c] === 2 || boardState[r][c] === 4) {
                        allMoves.push(...getMovesForPiece(r, c));
                    }
                }
            }

            if (allMoves.length === 0) {
                alert("Você venceu! O adversário não possui mais movimentos válidos.");
                resetToMenu();
                return;
            }

            // Prioridade total para pulos/capturas da IA
            let captures = allMoves.filter(m => m.capture !== null);
            let chosenMove = captures.length > 0 
                ? captures[Math.floor(Math.random() * captures.length)] 
                : allMoves[Math.floor(Math.random() * allMoves.length)];

            executeMove(chosenMove);
        }

        function checkGameOver() {
            if (pCount === 0) { alert("Fim de Jogo! A CPU venceu."); resetToMenu(); return true; }
            if (cpuCount === 0) { alert("Parabéns! Você derrotou o adversário."); resetToMenu(); return true; }
            return false;
        }

        function resetToMenu() {
            gameScreen.style.display = 'none';
            setupScreen.style.display = 'block';
            validMoves = [];
            selectedPiece = null;
        }

        document.getElementById('btn-start').addEventListener('click', () => {
            playerFlag = playerSelect.value;
            cpuFlag = cpuSelect.value;
            if (playerFlag === cpuFlag) {
                alert("Por favor, escolha países diferentes para o confronto!");
                return;
            }
            setupBoardState();
            setupScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            drawBoard();
        });

        document.getElementById('btn-reset').addEventListener('click', resetToMenu);

        document.addEventListener('DOMContentLoaded', populateSelects);
    </script>
</body>
</html>
